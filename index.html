<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pencarian Data Siswa SD</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

  <style>
    /* Reset Global & Tema Ceria */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Quicksand', sans-serif;
      background-color: #f0f9ff;
      color: #333;
      padding: clamp(10px, 3vw, 28px);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      line-height: 1.4;
    }
    .container {
      background-color: #ffffff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(149, 157, 165, 0.1);
      padding: clamp(14px, 4vw, 32px);
      width: 100%;
      max-width: 1100px; /* dibatasi biar tidak terlalu renggang di monitor lebar */
      border: 4px solid #bae6fd;
      align-self: flex-start;
      margin: clamp(6px, 2vw, 20px) auto 0;
    }
    h1 {
      font-family: 'Fredoka One', cursive;
      color: #0284c7;
      text-align: center;
      margin-bottom: 20px;
      font-size: clamp(1.35rem, 4vw, 2.3rem);
      text-shadow: 2px 2px #e0f2fe;
    }

    /* Box Form Pencarian (Fleksibel Flexbox) */
    .search-box {
      display: flex;
      flex-direction: column; /* Default HP: Susun ke bawah lurus */
      gap: 14px;
      margin-bottom: 25px;
      background-color: #f8fafc;
      padding: clamp(12px, 3vw, 20px);
      border-radius: 16px;
      border: 2px dashed #cbd5e1;
    }
    .form-group {
      width: 100%;
      min-width: 0; /* cegah overflow saat flex row di tablet/desktop */
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      color: #0369a1;
      font-size: 0.95rem;
    }
    input[type="text"], select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      font-family: 'Quicksand', sans-serif;
      font-size: 16px; /* >=16px agar iOS Safari tidak auto-zoom saat fokus */
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
      background-color: #fff;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="text"]:focus, select:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 4px #e0f2fe;
    }
    button {
      background-color: #38bdf8;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 0 #0284c7;
      transition: all 0.1s;
      min-height: 48px; /* target sentuh yang nyaman di HP */
    }
    button:active {
      transform: translateY(4px);
      box-shadow: none;
    }
    button:hover { filter: brightness(1.03); }

    /* --- SISTEM HASIL --- */
    .results-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 15px;
    }
    .siswa-card {
      background: #ffffff;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.01);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.2s;
      min-width: 0;
      overflow-wrap: break-word;
    }
    .siswa-card:hover {
      transform: translateY(-2px);
      border-color: #38bdf8;
      box-shadow: 0 6px 12px rgba(56, 189, 248, 0.1);
    }
    .siswa-card h3 {
      font-family: 'Fredoka One', cursive;
      color: #0ea5e9;
      margin-bottom: 12px;
      font-size: 1.15rem;
      border-bottom: 2px solid #e0f2fe;
      padding-bottom: 6px;
      overflow-wrap: break-word;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px dashed #f1f5f9;
      font-size: 0.95rem;
    }
    .info-row:last-of-type {
      border-bottom: none;
    }
    .info-label {
      font-weight: 700;
      color: #64748b;
      flex-shrink: 0;
    }
    .info-value {
      text-align: right;
      font-weight: 500;
      color: #1e293b;
      padding-left: 10px;
      overflow-wrap: break-word;
      word-break: break-all; /* email panjang tidak akan mendorong layout */
      min-width: 0;
    }
    .wa-block {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: center;
    }
    .btn-wa {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #22c55e;
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 700;
      box-shadow: 0 3px 0 #15803d;
      width: 100%;
      text-align: center;
      min-height: 40px;
    }
    .btn-wa:active {
      transform: translateY(2px);
      box-shadow: none;
    }
    .loading, .no-data {
      text-align: center;
      font-weight: 700;
      color: #94a3b8;
      padding: 30px 16px;
      grid-column: 1 / -1;
    }
    .loading { color: #64748b; display: none; }

    /* ==========================================================
       BREAKPOINTS BERTAHAP: HP kecil -> HP besar -> Tablet -> Laptop -> Monitor
       ========================================================== */

    /* HP kecil (contoh: 320-359px) sudah otomatis aman berkat clamp() di atas */

    /* Tablet ke atas (portrait tablet, ~600px+): form mulai berjejer,
       tapi grid hasil TETAP 1 kolom dulu supaya card tidak terlalu sempit */
    @media screen and (min-width: 600px) {
      .search-box {
        flex-direction: row;
        align-items: flex-end;
        flex-wrap: wrap;
      }
      .form-group-kelas { flex: 1 1 140px; }
      .form-group-nama { flex: 2 1 220px; }
      button { width: auto; padding: 12px 28px; flex-shrink: 0; }
    }

    /* Tablet landscape / laptop kecil ke atas (~768px+): hasil jadi 2 kolom */
    @media screen and (min-width: 768px) {
      .results-container {
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
      }
    }

    /* Laptop / desktop (~1024px+): hasil jadi 3 kolom, form lebih lega */
    @media screen and (min-width: 1024px) {
      .container { padding: 32px; }
      button { padding: 14px 40px; }
      .results-container {
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }
    }

    /* Monitor besar (~1400px+): batasi jadi maksimal 3 kolom yang lebih lega,
       daripada auto-fill yang bikin card jadi kekecilan/berantakan */
    @media screen and (min-width: 1400px) {
      .container { max-width: 1200px; }
    }

    /* HP sangat kecil (<= 359px): kecilkan sedikit padding & badge WA */
    @media screen and (max-width: 359px) {
      .container { border-radius: 18px; }
      .btn-wa { padding: 9px 12px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Cari Data Siswaku 🌟</h1>

  <div class="search-box">
    <div class="form-group form-group-kelas">
      <label for="kelas">Pilih Kelas</label>
      <select id="kelas">
        <option value="1">Kelas 1</option>
        <option value="2">Kelas 2</option>
        <option value="3">Kelas 3</option>
        <option value="4">Kelas 4</option>
        <option value="5">Kelas 5</option>
        <option value="6">Kelas 6</option>
      </select>
    </div>

    <div class="form-group form-group-nama">
      <label for="nama">Nama Siswa</label>
      <input type="text" id="nama" placeholder="Masukkan nama siswa...">
    </div>

    <button onclick="jalankanPencarian()">Cari! 🔍</button>
  </div>

  <div id="loading" class="loading">Sedang memproses data... Mohon ditunggu ya! ✨</div>

  <div id="resultsBox" class="results-container">
    <div id="pesanKosong" class="no-data">Silakan pilih kelas atau masukkan nama siswa untuk memulai.</div>
  </div>
</div>

<script>
  function jalankanPencarian() {
    var nama = document.getElementById('nama').value;
    var kelas = document.getElementById('kelas').value;

    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultsBox').innerHTML = '';

    // !!! GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA !!!
    var urlGoogleAppScript = "https://script.google.com/macros/s/AKfycbw8FczBZSOuGbH92pV0AKw2wnKTZb9SIEhACj51F4OEfioOPSOSxhUqjpzwNUWSFnyC/exec";

    var endpoint = `${urlGoogleAppScript}?nama=${encodeURIComponent(nama)}&kelas=${encodeURIComponent(kelas)}`;

    fetch(endpoint)
      .then(response => response.json())
      .then(hasil => {
        tampilkanHasil(hasil);
      })
      .catch(error => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('resultsBox').innerHTML = '<div class="no-data">Waduh, terjadi gangguan sistem: ' + error.message + '</div>';
      });
  }

  function tampilkanHasil(hasil) {
    document.getElementById('loading').style.display = 'none';
    var resultsBox = document.getElementById('resultsBox');
    resultsBox.innerHTML = '';

    if (hasil.error) {
      resultsBox.innerHTML = '<div class="no-data">' + hasil.error + '</div>';
      return;
    }

    if (!hasil || hasil.length === 0) {
      resultsBox.innerHTML = '<div class="no-data">Yah, data siswa tidak ditemukan 🕵️‍♂️</div>';
      return;
    }

    hasil.forEach(function(siswa) {
      var card = document.createElement('div');
      card.className = 'siswa-card';

      var waElement = '<span style="color:#94a3b8">Belum Tersedia</span>';
      if (siswa.linkWa) {
        waElement = '<a class="btn-wa" href="' + siswa.linkWa + '" target="_blank">Gabung Grup 💬</a>';
      }

      var emailRow = '';
      if (siswa.email) {
        emailRow = '<div class="info-row"><span class="info-label">Email</span><span class="info-value"><a href="mailto:' + siswa.email + '">' + siswa.email + '</a></span></div>';
      }

      card.innerHTML = `
        <div>
          <h3>${siswa.nama}</h3>
          <div class="info-row"><span class="info-label">Panggilan</span><span class="info-value">${siswa.panggilan}</span></div>
          <div class="info-row"><span class="info-label">Kelas</span><span class="info-value">${siswa.kelas}</span></div>
          <div class="info-row"><span class="info-label">Wali Kelas</span><span class="info-value">${siswa.waliKelas}</span></div>
          ${emailRow}
        </div>
        <div class="wa-block">${waElement}</div>
      `;

      resultsBox.appendChild(card);
    });
  }
</script>

</body>
</html>
